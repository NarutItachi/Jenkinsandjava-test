apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app
  labels:
    app: java-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:
        - name: java-app
          image: 007761757757.dkr.ecr.ap-south-1.amazonaws.com/jenkinsecr:latest
          ports:
            - containerPort: 8080
